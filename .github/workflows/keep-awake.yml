name: Keep Render Service Awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Service
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://commons-marketplace.onrender.com/health)
          echo "Health check status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Service is alive ✓"
          else
            echo "Service returned $HTTP_STATUS — might be spinning up"
          fi