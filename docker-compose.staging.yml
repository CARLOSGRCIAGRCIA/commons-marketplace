version: '3.8'

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            target: runner
        ports:
            - '3000:3000'
        env_file:
            - .env.staging
        environment:
            - NODE_ENV=staging
        depends_on:
            mongodb:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - backend

    mongodb:
        image: mongo:7
        ports:
            - '27017:27017'
        volumes:
            - mongodb-data:/data/db
        restart: unless-stopped
        networks:
            - backend

networks:
    backend:
        driver: bridge

volumes:
    mongodb-data:
