version: '3.8'

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            target: runner
        ports:
            - '3000:3000'
        env_file:
            - .env.production
        environment:
            - NODE_ENV=production
        depends_on:
            mongodb:
                condition: service_healthy
        restart: unless-stopped
        healthcheck:
            test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/health']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        networks:
            - backend
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'

    mongodb:
        image: mongo:7
        ports:
            - '27017:27017'
        env_file:
            - .env.production
        volumes:
            - mongodb-data:/data/db
        restart: unless-stopped
        healthcheck:
            test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        networks:
            - backend

networks:
    backend:
        driver: bridge

volumes:
    mongodb-data:
